<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia | Phantom Node</title>
    <style>
        body { background-color: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #matrix-ring { width: 200px; height: 200px; border: 2px solid #00ffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #00ffff; transition: all 0.3s ease; }
        .listening { box-shadow: 0 0 50px #00ffff, inset 0 0 30px #00ffff !important; transform: scale(1.05); }
        #status { margin-top: 30px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        #transcript { margin-top: 20px; color: #aaaaaa; font-size: 0.9rem; text-align: center; max-width: 80%; height: 60px; overflow: hidden; }
        .mic-btn { background: transparent; color: #00ffff; border: 1px solid #00ffff; padding: 15px 30px; font-size: 1rem; text-transform: uppercase; margin-top: 40px; cursor: pointer; letter-spacing: 1px; }
        .mic-btn:hover { background: rgba(0, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="matrix-ring"><h2 id="core-text">SOFIA</h2></div>
    <div id="status">System Standby</div>
    <div id="transcript">Awaiting neural link...</div>
    <button class="mic-btn" onclick="manualEngage()">Engage Audio Matrix</button>

    <script>
        const CLOUD_URL = "wss://sofia-mainframe.onrender.com/ws/sofia";
        let websocket;
        let recognition;
        let serverTimeout; 
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const ringEl = document.getElementById('matrix-ring');

        // --- STATE TRACKERS FOR CONTINUOUS BARGE-IN ---
        let systemActive = false;
        let isSpeaking = false;
        let isListening = false;

        function connectToBrain() {
            statusEl.innerText = "Connecting to Cloud...";
            websocket = new WebSocket(CLOUD_URL);
            
            websocket.onopen = () => {
                statusEl.innerText = "Neural Link Established";
                if(navigator.vibrate) navigator.vibrate([50, 50, 50]); 
                setInterval(() => { if(websocket.readyState === WebSocket.OPEN) websocket.send("[PING]"); }, 20000);
                
                setTimeout(() => {
                    let currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    websocket.send(`[WAKE_SEQUENCE] A Phantom Node has connected. The local time is ${currentTime}. Greet the guest warmly, show your J.A.R.V.I.S. persona, and politely ask for their name.`);
                }, 1000);
            };
            
            websocket.onmessage = (event) => {
                clearTimeout(serverTimeout);
                let responseText = event.data;
                
                if (responseText.includes("[EXECUTE_LOCAL:")) executeCommand(responseText);

                if (responseText.includes("[AUDIO_ROUTED]")) {
                    responseText = responseText.replace("[AUDIO_ROUTED]", "").trim();
                }
                
                transcriptEl.innerText = "SOFIA: " + responseText.trim();
                
                let spokenText = responseText.replace(/\[EXECUTE_PYTHON\][\s\S]*?\[\/EXECUTE_PYTHON\]/g, "");
                spokenText = spokenText.replace(/\[.*?\]/g, "").trim();
                
                if(spokenText.length > 0) {
                    speakResponse(spokenText);
                }
            };
            
            websocket.onclose = () => {
                statusEl.innerText = "Connection Lost. Retrying...";
                setTimeout(connectToBrain, 3000);
            };
        }

        function executeCommand(text) {
            if(navigator.vibrate) navigator.vibrate(100); 
            if (text.includes("[EXECUTE_LOCAL:")) {
                let match = text.match(/\[EXECUTE_LOCAL:\s*(.*?)\]/);
                if(match && match[1]) {
                    let uri = match[1].trim();
                    if (uri.startsWith('www.')) uri = 'https://' + uri;
                    window.location.assign(uri); 
                }
            }
        }

        async function getBatteryStatus() {
            if ('getBattery' in navigator) {
                let battery = await navigator.getBattery();
                let level = Math.round(battery.level * 100);
                let charging = battery.charging ? "charging" : "discharging";
                return `My battery is at ${level} percent and is currently ${charging}.`;
            }
            return "I do not have access to the battery telemetry on this device.";
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel(); 
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                let voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    let selectedVoice = voices.find(v => v.name.toLowerCase().includes('zira') || v.name.toLowerCase().includes('samantha')) 
                                     || voices.find(v => v.name.toLowerCase().includes('female')) 
                                     || voices[0]; 
                    if(selectedVoice) utterance.voice = selectedVoice;
                }
                
                utterance.rate = 1.05;
                utterance.pitch = 1.1; 
                
                utterance.onstart = () => { 
                    isSpeaking = true; 
                    ringEl.classList.remove('listening');
                };

                utterance.onend = () => {
                    isSpeaking = false;
                    statusEl.innerText = "Standing By";
                    if (systemActive) startListening();
                };
                
                utterance.onerror = () => { isSpeaking = false; };
                
                window.speechSynthesisUtteranceHack = utterance; 
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const rec = new SpeechRecognition();
            
            // --- THE J.A.R.V.I.S. UPGRADE: CONTINUOUS & INTERIM LISTENING ---
            rec.continuous = true; 
            rec.interimResults = true; 
            
            rec.onstart = () => {
                isListening = true;
                if (!isSpeaking) {
                    ringEl.classList.add('listening');
                    statusEl.innerText = "Matrix Listening...";
                }
            };
            
            rec.onresult = async (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                // If she is talking, and you make a sound, KILL HER AUDIO INSTANTLY.
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    isSpeaking = false;
                    if(navigator.vibrate) navigator.vibrate(50);
                    transcriptEl.innerText = "System interrupted. Listening...";
                }

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (interimTranscript) {
                    transcriptEl.innerText = "HEARING: " + interimTranscript;
                }

                if (finalTranscript) {
                    const command = finalTranscript.toLowerCase().trim();
                    if(!command) return;
                    
                    if (command.includes("battery") || command.includes("power level")) {
                        let batStat = await getBatteryStatus();
                        speakResponse(batStat);
                        return; 
                    }
                    
                    transcriptEl.innerText = "YOU: " + command;
                    statusEl.innerText = "Transmitting to Cloud...";
                    ringEl.classList.remove('listening');
                    
                    if(websocket.readyState === WebSocket.OPEN) {
                        websocket.send(command); 
                        
                        clearTimeout(serverTimeout);
                        serverTimeout = setTimeout(() => {
                            if (statusEl.innerText.includes("Transmitting")) {
                                statusEl.innerText = "Standing By";
                                transcriptEl.innerText = "SYSTEM: Cloud lag bypass engaged.";
                                if (systemActive) startListening();
                            }
                        }, 30000); 
                    }
                }
            };
            
            rec.onerror = (e) => {
                isListening = false;
                ringEl.classList.remove('listening');
                if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    systemActive = false;
                }
            };
            
            rec.onend = () => { 
                isListening = false; 
                // INFINITE LOOP: If the system is active and she isn't speaking, keep the mic open forever.
                if (systemActive && !isSpeaking) {
                    startListening();
                }
            };
            
            return rec;
        }

        function manualEngage() {
            if (!systemActive) {
                let silent = new SpeechSynthesisUtterance('');
                silent.volume = 0;
                window.speechSynthesis.speak(silent);
                systemActive = true;
                statusEl.innerText = "System Fully Armed";
                startListening();
            } else {
                window.speechSynthesis.cancel();
                isSpeaking = false;
            }
        }

        function startListening() {
            if (isListening) return; 
            if (!recognition) recognition = initSpeech();
            if (recognition) { try { recognition.start(); } catch(e) {} }
        }

        window.onload = () => { window.speechSynthesis.getVoices(); connectToBrain(); };
    </script>
</body>
</html>
