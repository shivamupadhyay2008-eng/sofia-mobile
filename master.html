<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia | MASTER NODE</title>
    <style>
        body {
            background-color: #050505;
            color: #ff003c; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #matrix-ring {
            width: 200px;
            height: 200px;
            border: 2px solid #ff003c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #ff003c;
            transition: all 0.3s ease;
        }
        .listening {
            box-shadow: 0 0 50px #ff003c, inset 0 0 30px #ff003c !important;
            transform: scale(1.05);
        }
        #status { margin-top: 30px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        #transcript { margin-top: 20px; color: #aaaaaa; font-size: 0.9rem; text-align: center; max-width: 80%; height: 60px; overflow: hidden; }
        .control-panel { display: flex; gap: 15px; margin-top: 40px; }
        .action-btn { background: transparent; color: #ff003c; border: 1px solid #ff003c; padding: 15px 20px; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: 0.2s; }
        .action-btn:hover { background: rgba(255, 0, 60, 0.1); }
    </style>
</head>
<body>

    <div id="matrix-ring">
        <h2 id="core-text">MASTER</h2>
    </div>
    
    <div id="status">System Standby</div>
    <div id="transcript">Awaiting admin link...</div>
    
    <div class="control-panel">
        <button class="action-btn" onclick="startListening()">Engage Audio Matrix</button>
        <button class="action-btn" onclick="syncClipboard()">Push Clipboard to PC</button>
    </div>

    <script>
        const CLOUD_URL = "wss://sofia-mainframe.onrender.com/ws/sofia";
        let websocket;
        let recognition;
        
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const ringEl = document.getElementById('matrix-ring');

        function connectToBrain() {
            statusEl.innerText = "Connecting to Cloud...";
            websocket = new WebSocket(CLOUD_URL);
            
            websocket.onopen = () => {
                statusEl.innerText = "Admin Link Established";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                
                setInterval(() => {
                    if(websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send("[PING]");
                    }
                }, 20000);
            };
            
            websocket.onmessage = (event) => {
                let responseText = event.data;
                
                if (responseText.includes("[EXECUTE:")) executeCommand(responseText);
                
                transcriptEl.innerText = "SOFIA: " + responseText.trim();
                
                let spokenText = responseText.replace(/\[EXECUTE_PYTHON\].*?\[\/EXECUTE_PYTHON\]/gs, "");
                spokenText = spokenText.replace(/\[.*?\]/g, "").trim();
                
                if(spokenText.length > 0) speakResponse(spokenText);
                else startListening(); 
            };
            
            websocket.onclose = () => {
                statusEl.innerText = "Connection Lost. Retrying...";
                setTimeout(connectToBrain, 3000);
            };
        }

        // --- TELEPATHIC CLIPBOARD FUNCTION ---
        async function syncClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && websocket && websocket.readyState === WebSocket.OPEN) {
                    statusEl.innerText = "Beaming Clipboard to PC...";
                    transcriptEl.innerText = "PAYLOAD: " + text.substring(0, 30) + "...";
                    websocket.send(`[AUTH: SHIVAM_PRIME] [CLIPBOARD_SYNC] I need you to type this exact text onto the PC right now: ${text}`);
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            } catch (err) {
                transcriptEl.innerText = "Error: Clipboard access denied by mobile browser.";
            }
        }

        function executeCommand(text) {
            if(navigator.vibrate) navigator.vibrate(100); 
            if (text.includes("[EXECUTE: YOUTUBE]")) {
                window.location.href = "vnd.youtube://"; 
                setTimeout(() => window.open("https://youtube.com", "_blank"), 500); 
            }
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel(); // The Interrupt Switch
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('zira'));
            if(femaleVoice) utterance.voice = femaleVoice;
            utterance.rate = 1.05;
            utterance.pitch = 1.1; 
            utterance.onend = () => startListening();
            window.speechSynthesis.speak(utterance);
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const rec = new SpeechRecognition();
            rec.continuous = false;
            
            rec.onstart = () => {
                ringEl.classList.add('listening');
                statusEl.innerText = "Master Mic Active...";
                transcriptEl.innerText = "Listening...";
            };
            
            rec.onresult = async (event) => {
                const command = event.results[0][0].transcript.toLowerCase();
                transcriptEl.innerText = "YOU: " + command;
                statusEl.innerText = "Transmitting...";
                ringEl.classList.remove('listening');
                
                if(websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send("[AUTH: SHIVAM_PRIME] " + command);
                }
            };
            
            rec.onerror = () => {
                ringEl.classList.remove('listening');
                statusEl.innerText = "Standing By";
            };
            return rec;
        }

        function startListening() {
            window.speechSynthesis.cancel(); // The Interrupt Switch
            if(!recognition) recognition = initSpeech();
            if(recognition) {
                try { recognition.start(); } catch(e) {} 
            }
        }

        window.onload = () => {
            window.speechSynthesis.getVoices();
            connectToBrain();
        };
    </script>
</body>
</html>
