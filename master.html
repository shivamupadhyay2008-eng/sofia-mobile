<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia | MASTER NODE</title>
    <style>
        body { background-color: #050505; color: #ff003c; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #matrix-ring { width: 200px; height: 200px; border: 2px solid #ff003c; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #ff003c; transition: all 0.3s ease; }
        .listening { box-shadow: 0 0 50px #ff003c, inset 0 0 30px #ff003c !important; transform: scale(1.05); }
        #status { margin-top: 30px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        #transcript { margin-top: 20px; color: #aaaaaa; font-size: 0.9rem; text-align: center; max-width: 80%; height: 60px; overflow: hidden; }
        .control-panel { display: flex; gap: 15px; margin-top: 40px; }
        .action-btn { background: transparent; color: #ff003c; border: 1px solid #ff003c; padding: 15px 20px; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: 0.2s; }
        .action-btn:hover { background: rgba(255, 0, 60, 0.1); }
    </style>
</head>
<body>

    <div id="matrix-ring"><h2 id="core-text">MASTER</h2></div>
    <div id="status">System Standby</div>
    <div id="transcript">Awaiting boot sequence...</div>
    
    <div class="control-panel">
        <button id="main-btn" class="action-btn" onclick="systemInit()">Initialize System</button>
        <button class="action-btn" onclick="syncClipboard()">Push Clipboard</button>
    </div>

    <script>
        const CLOUD_URL = "wss://sofia-mainframe.onrender.com/ws/sofia";
        let websocket;
        let recognition;
        let serverTimeout; 
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const ringEl = document.getElementById('matrix-ring');
        const mainBtn = document.getElementById('main-btn');

        // --- STATE TRACKERS ---
        let systemBooted = false;
        let isSpeaking = false;
        let isListening = false;

        function connectToBrain() {
            statusEl.innerText = "Connecting to Cloud Server...";
            websocket = new WebSocket(CLOUD_URL);
            
            websocket.onopen = () => {
                statusEl.innerText = "Admin Link Established.\nTap 'Initialize System' to begin.";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                setInterval(() => { if(websocket.readyState === WebSocket.OPEN) websocket.send("[PING]"); }, 20000);
            };
            
            websocket.onmessage = (event) => {
                clearTimeout(serverTimeout);
                let responseText = event.data;
                
                if (responseText.includes("[EXECUTE_LOCAL:")) executeCommand(responseText);
               
                if (responseText.includes("[DIAGNOSTIC_DUMP]")) {
                    let dumpData = responseText.replace("[DIAGNOSTIC_DUMP]", "").trim();
                    navigator.clipboard.writeText(dumpData).then(() => {
                        statusEl.innerText = "DIAGNOSTIC COPIED";
                        transcriptEl.innerText = "System log copied to clipboard.";
                        if(navigator.vibrate) navigator.vibrate([200, 100, 200]); 
                    }).catch(err => { transcriptEl.innerText = "Clipboard block. Check permissions."; });
                    if (isSpeaking) window.speechSynthesis.cancel();
                    return; 
                }

                if (responseText.includes("[AUDIO_ROUTED]")) {
                    responseText = responseText.replace("[AUDIO_ROUTED]", "").trim();
                }
                
                transcriptEl.innerText = "SOFIA: " + responseText.trim();
                
                let spokenText = responseText.replace(/\[EXECUTE_PYTHON\][\s\S]*?\[\/EXECUTE_PYTHON\]/g, "");
                spokenText = spokenText.replace(/\[.*?\]/g, "").trim();
                
                if(spokenText.length > 0) {
                    speakResponse(spokenText);
                } else {
                    statusEl.innerText = "Standing By";
                    startListening();
                }
            };
            
            websocket.onclose = () => {
                statusEl.innerText = "Connection Lost. Retrying...";
                setTimeout(connectToBrain, 3000);
            };
        }

        async function syncClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && websocket.readyState === WebSocket.OPEN) {
                    statusEl.innerText = "Beaming Clipboard to PC...";
                    websocket.send(`[AUTH: SHIVAM_PRIME] [CLIPBOARD_SYNC] ${text}`);
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            } catch (err) {}
        }

        function executeCommand(text) {
            if(navigator.vibrate) navigator.vibrate(100); 
            if (text.includes("[EXECUTE_LOCAL:")) {
                let match = text.match(/\[EXECUTE_LOCAL:\s*(.*?)\]/);
                if(match && match[1]) {
                    window.location.href = match[1].trim(); 
                }
            }
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel(); 
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                let voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    let selectedVoice = voices.find(v => v.name.toLowerCase().includes('zira') || v.name.toLowerCase().includes('samantha')) 
                                     || voices.find(v => v.name.toLowerCase().includes('female')) 
                                     || voices[0]; 
                    if(selectedVoice) utterance.voice = selectedVoice;
                }
                
                utterance.rate = 1.05;
                utterance.pitch = 1.1; 
                
                utterance.onstart = () => { 
                    isSpeaking = true; 
                    ringEl.classList.remove('listening');
                    statusEl.innerText = "Sofia is speaking...";
                };

                // The exact millisecond she finishes, SNAP the mic open.
                utterance.onend = () => {
                    isSpeaking = false;
                    statusEl.innerText = "Standing By";
                    if (systemBooted) startListening();
                };
                
                utterance.onerror = () => { 
                    isSpeaking = false; 
                    if (systemBooted) startListening();
                };
                
                window.speechSynthesisUtteranceHack = utterance; 
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const rec = new SpeechRecognition();
            
            rec.continuous = true; 
            rec.interimResults = true; 
            
            rec.onstart = () => {
                isListening = true;
                if (!isSpeaking) {
                    ringEl.classList.add('listening');
                    statusEl.innerText = "Master Mic Active...";
                }
            };
            
            rec.onresult = async (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                // If the hardware glitches and she talks while you talk, stop her.
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    isSpeaking = false;
                    if(navigator.vibrate) navigator.vibrate(50);
                }

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }

                if (interimTranscript) transcriptEl.innerText = "HEARING: " + interimTranscript;

                if (finalTranscript) {
                    const command = finalTranscript.toLowerCase().trim();
                    if(!command) return;
                    
                    transcriptEl.innerText = "YOU: " + command;
                    statusEl.innerText = "Transmitting to Cloud...";
                    ringEl.classList.remove('listening');
                    
                    if(websocket.readyState === WebSocket.OPEN) {
                        websocket.send("[AUTH: SHIVAM_PRIME] " + command);
                        
                        clearTimeout(serverTimeout);
                        serverTimeout = setTimeout(() => {
                            if (statusEl.innerText.includes("Transmitting")) {
                                statusEl.innerText = "Processing Complex Matrix... (Server Waking)";
                            }
                        }, 5000); 
                    }
                }
            };
            
            rec.onerror = (e) => {
                isListening = false;
                ringEl.classList.remove('listening');
            };
            
            // THE AGGRESSIVE RESTART LOOP: Never let the mic die while system is booted
            rec.onend = () => { 
                isListening = false; 
                if (systemBooted && !isSpeaking) {
                    setTimeout(startListening, 100);
                }
            };
            
            return rec;
        }

        // --- THE SYSTEM INIT & WAKE PROTOCOL ---
        function systemInit() {
            if (!systemBooted) {
                // 1. Fire silent audio to bypass browser lock permanently
                let silent = new SpeechSynthesisUtterance('');
                silent.volume = 0;
                window.speechSynthesis.speak(silent);
                
                // 2. Arm the system logic
                systemBooted = true;
                mainBtn.innerText = "Force Interrupt (Barge-In)";
                
                // 3. Send the Wake Protocol
                let currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if(websocket.readyState === WebSocket.OPEN) {
                    websocket.send(`[AUTH: SHIVAM_PRIME] [WAKE_SEQUENCE] System boot sequence complete. The local time is ${currentTime}. Initiate the Prime Admin greeting protocol warmly.`);
                }
            } else {
                // Manual Barge-In: If tapped again, it kills her current sentence instantly
                window.speechSynthesis.cancel();
                isSpeaking = false;
                startListening();
            }
        }

        function startListening() {
            if (isListening || isSpeaking) return; 
            if (!recognition) recognition = initSpeech();
            if (recognition) { try { recognition.start(); } catch(e) {} }
        }

        window.onload = () => { window.speechSynthesis.getVoices(); connectToBrain(); };
    </script>
</body>
</html>
