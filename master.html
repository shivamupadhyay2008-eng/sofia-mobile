<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia | Master Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff003c;
            --red-dim: rgba(255,0,60,0.15);
            --red-glow: 0 0 20px rgba(255,0,60,0.6);
            --bg: #040404;
            --text: #ff003c;
            --muted: #661122;
            --panel: rgba(255,0,60,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Matrix rain canvas */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.12;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Orb */
        .orb-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 24px;
        }

        .orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 1.5px solid var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--red-glow), inset 0 0 15px rgba(255,0,60,0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .orb::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid rgba(255,0,60,0.3);
        }

        .orb::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1px dashed rgba(255,0,60,0.15);
            animation: spin 12s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .orb.listening {
            box-shadow: 0 0 60px rgba(255,0,60,0.8), 0 0 120px rgba(255,0,60,0.3), inset 0 0 40px rgba(255,0,60,0.2);
            transform: scale(1.06);
        }

        .orb.speaking {
            box-shadow: 0 0 40px rgba(255,80,80,0.9), inset 0 0 30px rgba(255,0,60,0.15);
        }

        .orb-label {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: var(--red);
            text-shadow: var(--red-glow);
            z-index: 2;
        }

        /* Waveform bars */
        #waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 16px;
        }

        .bar {
            width: 3px;
            height: 4px;
            background: var(--red);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        .bar.active { animation: pulse-bar 0.6s ease infinite alternate; }

        @keyframes pulse-bar {
            from { height: 4px; }
            to { height: 32px; }
        }

        /* Status */
        #status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--red);
            opacity: 0.9;
            margin-bottom: 12px;
            text-align: center;
            min-height: 20px;
        }

        /* Conversation log */
        #log {
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--muted);
            background: var(--panel);
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.78rem;
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: var(--red) transparent;
        }

        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

        .log-entry { margin-bottom: 6px; }
        .log-entry.user { color: #ff6680; }
        .log-entry.sofia { color: var(--red); opacity: 0.85; }
        .log-entry span { opacity: 0.5; font-size: 0.7rem; margin-right: 6px; }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red);
            padding: 12px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--red);
            transform: translateY(100%);
            transition: transform 0.2s;
            z-index: -1;
        }

        .btn:hover::before { transform: translateY(0); }
        .btn:hover { color: #000; }

        .btn.primary { border-color: var(--red); box-shadow: var(--red-glow); }

        /* Connection dot */
        .conn-dot {
            position: fixed;
            top: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            z-index: 100;
            transition: background 0.3s;
        }
        .conn-dot.online { background: var(--red); box-shadow: var(--red-glow); animation: blink 2s ease infinite; }
        .conn-dot.offline { background: #555; }

        @keyframes blink { 50% { opacity: 0.4; } }

        /* Tag */
        .node-tag {
            position: fixed;
            top: 12px;
            left: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--muted);
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="node-tag">MASTER NODE // SHIVAM_PRIME</div>
    <div class="conn-dot" id="conn-dot"></div>

    <div class="ui-layer">
        <div class="orb-wrap">
            <div class="orb" id="orb">
                <span class="orb-label">SOFIA</span>
            </div>
        </div>

        <div id="waveform">
            <!-- 16 bars generated by JS -->
        </div>

        <div id="status">System Standby</div>

        <div id="log">
            <div class="log-entry sofia"><span>//</span>Awaiting boot sequence...</div>
        </div>

        <div class="btn-row">
            <button id="init-btn" class="btn primary" onclick="systemInit()">Initialize</button>
            <button class="btn" onclick="syncClipboard()">Push Clipboard</button>
            <button class="btn" onclick="interrupt()">Interrupt</button>
        </div>
    </div>

    <script>
        // Dynamic WebSocket URL — auto-detects Render vs local offline server
        const _proto    = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const _host     = window.location.hostname || 'localhost';
        const _port     = window.location.port;
        const _base     = _port ? `${_host}:${_port}` : _host;
        const CLOUD_URL = `${_proto}${_base}/ws/sofia`;

        // ── HMAC Auth ──────────────────────────────────────────────────────
        // Same secret as SOFIA_SECRET env var on Render + your PC.
        // Change this if you change your server secret.
        const SOFIA_SECRET = localStorage.getItem('sofia_secret') || '';
        if (!SOFIA_SECRET) console.warn('[SOFIA] Set secret: localStorage.setItem(\'sofia_secret\', \'your_key\')');

        async function _hmacToken() {
            const ts    = Math.floor(Date.now() / 1000);
            const tsR   = Math.floor(ts / 30) * 30;
            const key   = await crypto.subtle.importKey('raw',
                new TextEncoder().encode(SOFIA_SECRET), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
            const sig   = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(String(tsR)));
            const hex   = Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
            return `[AUTH:${hex.slice(0,16)}:${ts}]`;
        }

        async function authSend(msg) {
            const token = await _hmacToken();
            if (ws.readyState === 1) ws.send(`${token} ${msg}`);
        }

        let ws, recognition, serverTimeout;
        const statusEl = document.getElementById('status');
        const orbEl = document.getElementById('orb');
        const logEl = document.getElementById('log');
        const initBtn = document.getElementById('init-btn');
        const connDot = document.getElementById('conn-dot');

        let booted = false, speaking = false, listening = false;

        // ── Matrix Rain ─────────────────────────────────────────────────
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const cols = Math.floor(canvas.width / 16);
        const drops = Array(cols).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(4,4,4,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff003c';
            ctx.font = '13px Share Tech Mono';
            for (let i = 0; i < drops.length; i++) {
                const ch = Math.random() < 0.5
                    ? String.fromCharCode(0x30A0 + Math.random() * 96)
                    : String.fromCharCode(48 + Math.floor(Math.random() * 10));
                ctx.fillText(ch, i * 16, drops[i] * 16);
                if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 55);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ── Waveform ─────────────────────────────────────────────────────
        const waveEl = document.getElementById('waveform');
        const NUM_BARS = 20;
        for (let i = 0; i < NUM_BARS; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            b.id = `bar-${i}`;
            waveEl.appendChild(b);
        }

        let waveInterval;
        function startWave() {
            clearInterval(waveInterval);
            waveInterval = setInterval(() => {
                for (let i = 0; i < NUM_BARS; i++) {
                    const b = document.getElementById(`bar-${i}`);
                    const h = 4 + Math.random() * 28;
                    b.style.height = h + 'px';
                    b.style.opacity = 0.4 + Math.random() * 0.6;
                }
            }, 80);
        }
        function stopWave() {
            clearInterval(waveInterval);
            for (let i = 0; i < NUM_BARS; i++) {
                document.getElementById(`bar-${i}`).style.height = '4px';
            }
        }

        // ── Log helper ────────────────────────────────────────────────────
        function addLog(text, who) {
            const d = document.createElement('div');
            d.className = `log-entry ${who}`;
            const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            d.innerHTML = `<span>${ts}</span>${text.substring(0, 200)}`;
            logEl.appendChild(d);
            logEl.scrollTop = logEl.scrollHeight;
            // Keep log from growing forever
            while (logEl.children.length > 30) logEl.removeChild(logEl.firstChild);
        }

        // ── WebSocket ─────────────────────────────────────────────────────
        let _retryDelay = 1000;   // Exponential backoff start

        function connect() {
            statusEl.innerText = 'Connecting to mainframe...';
            ws = new WebSocket(CLOUD_URL);

            ws.onopen = () => {
                connDot.className = 'conn-dot online';
                statusEl.innerText = 'Admin link established';
                _retryDelay = 1000;   // Reset backoff on successful connection
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setInterval(() => { if (ws.readyState === 1) ws.send('[PING]'); }, 20000);
                if (booted) {
                    setTimeout(() => authSend('[SILENT_SYNC]'), 1000);
                }
            };

            // ── Streaming TTS queue ──────────────────────────────────────
            // [SS] = stream sentence — speak immediately, accumulate for log
            // [SE] = stream end — finalise log entry, re-open mic
            let _ttsQueue = [];
            let _ttsPlaying = false;
            let _streamBuffer = '';

            function _pickVoice() {
                const vv = window.speechSynthesis.getVoices();
                return vv.find(v => v.name.toLowerCase().includes('zira'))
                    || vv.find(v => v.name.toLowerCase().includes('samantha'))
                    || vv.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
                    || vv.find(v => v.lang.startsWith('en'))
                    || vv[0] || null;
            }

            function _processQueue() {
                if (_ttsQueue.length === 0) {
                    _ttsPlaying = false;
                    return;
                }
                _ttsPlaying = true;
                const sentence = _ttsQueue.shift();
                const utt = new SpeechSynthesisUtterance(sentence);
                const v = _pickVoice();
                if (v) utt.voice = v;
                utt.rate = 1.05; utt.pitch = 1.08;
                utt.onstart = () => {
                    speaking = true; listening = false;
                    orbEl.className = 'orb speaking';
                    statusEl.innerText = 'Sofia is speaking...';
                    startWave();
                    if (recognition && isListening) { try { recognition.stop(); } catch(e){} }
                };
                utt.onend = () => {
                    if (_ttsQueue.length === 0) {
                        speaking = false;
                        orbEl.className = 'orb';
                        statusEl.innerText = 'Standing by';
                        stopWave();
                    }
                    _processQueue();
                };
                utt.onerror = () => { speaking = false; stopWave(); _processQueue(); };
                window._sofiaUtt = utt;
                window.speechSynthesis.speak(utt);
            }

            function enqueueSentence(sentence) {
                _ttsQueue.push(sentence);
                if (!_ttsPlaying) _processQueue();
            }

            ws.onmessage = (e) => {
                clearTimeout(serverTimeout);
                const raw = e.data;

                // ── Streaming sentence ──────────────────────────────────
                if (raw.startsWith('[SS]')) {
                    const sentence = raw.slice(4).trim();
                    if (sentence) {
                        _streamBuffer += sentence + ' ';
                        statusEl.innerText = 'Sofia is speaking...';
                        enqueueSentence(sentence);
                    }
                    return;
                }

                // ── Stream end ──────────────────────────────────────────
                if (raw.startsWith('[SE]')) {
                    const full = raw.slice(4).trim() || _streamBuffer.trim();
                    if (full) addLog(full, 'sofia');
                    _streamBuffer = '';
                    // Re-open mic after last sentence finishes speaking
                    const restartWhenDone = setInterval(() => {
                        if (!_ttsPlaying && !speaking && booted) {
                            clearInterval(restartWhenDone);
                            setTimeout(startListening, 200);
                        }
                    }, 100);
                    return;
                }

                // ── Diagnostic dump ─────────────────────────────────────
                if (raw.includes('[DIAGNOSTIC_DUMP]')) {
                    navigator.clipboard.writeText(raw.replace('[DIAGNOSTIC_DUMP]','').trim()).catch(()=>{});
                    addLog('[Diagnostic dump copied to clipboard]', 'sofia');
                    return;
                }

                // ── Legacy fallback (non-streaming responses) ───────────
                let text = raw;
                if (text.includes('[AUDIO_ROUTED]')) text = text.replace('[AUDIO_ROUTED]','').trim();
                let spoken = text.replace(/\[EXECUTE_PYTHON\][\s\S]*?\[\/EXECUTE_PYTHON\]/g,'');
                spoken = spoken.replace(/\[.*?\]/g,'').trim();
                if (spoken.length > 0) {
                    addLog(spoken, 'sofia');
                    speakResponse(spoken);
                } else {
                    statusEl.innerText = 'Standing by';
                    startListening();
                }
            };

            ws.onclose = () => {
                connDot.className = 'conn-dot offline';
                statusEl.innerText = 'Connection lost — retrying...';
                // Exponential backoff: 1s → 2s → 4s → ... → 30s max
                // Prevents mobile browser throttling on Render sleep cycles
                setTimeout(connect, _retryDelay);
                _retryDelay = Math.min(_retryDelay * 2, 30000);
            };
        }

        // ── Execute local redirect ─────────────────────────────────────
        function executeLocal(text) {
            if (navigator.vibrate) navigator.vibrate(100);
            const m = text.match(/\[EXECUTE_LOCAL:\s*(.*?)\]/);
            if (m && m[1]) {
                let uri = m[1].trim();
                if (uri.startsWith('www.')) uri = 'https://' + uri;
                window.location.assign(uri);
            }
        }

        // ── TTS ────────────────────────────────────────────────────────
        function speakResponse(text) {
            window.speechSynthesis.cancel();
            if (recognition && listening) { try { recognition.stop(); } catch(e) {} }

            setTimeout(() => {
                const utt = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                if (voices.length) {
                    const v = voices.find(v => v.name.toLowerCase().includes('zira'))
                           || voices.find(v => v.name.toLowerCase().includes('samantha'))
                           || voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('female'))
                           || voices.find(v => v.lang.startsWith('en'))
                           || voices[0];
                    if (v) utt.voice = v;
                }
                utt.rate = 1.05; utt.pitch = 1.08;

                utt.onstart = () => {
                    speaking = true; listening = false;
                    orbEl.className = 'orb speaking';
                    statusEl.innerText = 'Sofia is speaking...';
                    startWave();
                };
                utt.onend = () => {
                    speaking = false;
                    orbEl.className = 'orb';
                    statusEl.innerText = 'Standing by';
                    stopWave();
                    if (booted) setTimeout(startListening, 200);
                };
                utt.onerror = () => {
                    speaking = false; stopWave();
                    if (booted) setTimeout(startListening, 200);
                };

                window._sofiaUtt = utt;
                window.speechSynthesis.speak(utt);
            }, 100);
        }

        // ── Speech recognition ────────────────────────────────────────
        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const rec = new SR();
            rec.continuous = false;  // Single-shot per turn (more reliable on mobile)
            rec.interimResults = false;
            rec.lang = 'en-IN';

            rec.onstart = () => {
                listening = true;
                orbEl.className = 'orb listening';
                statusEl.innerText = 'Master mic active...';
            };

            rec.onresult = async (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase().trim();
                if (!cmd) return;
                addLog(cmd, 'user');
                statusEl.innerText = 'Transmitting...';
                orbEl.className = 'orb';
                if (ws.readyState === 1) {
                    authSend(cmd);
                    serverTimeout = setTimeout(() => {
                        if (statusEl.innerText.includes('Transmitting'))
                            statusEl.innerText = 'Processing... (server waking)';
                    }, 5000);
                }
            };

            rec.onerror = () => { listening = false; orbEl.className = 'orb'; };
            rec.onend = () => {
                listening = false;
                if (booted && !speaking) setTimeout(startListening, 200);
            };
            return rec;
        }

        function startListening() {
            if (listening || speaking) return;
            if (!recognition) recognition = initSpeech();
            if (recognition) { try { recognition.start(); } catch(e) {} }
        }

        // ── Clipboard sync ────────────────────────────────────────────
        async function syncClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && ws.readyState === 1) {
                    statusEl.innerText = 'Beaming clipboard to PC...';
                    authSend('[CLIPBOARD_SYNC] ' + text);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            } catch(e) {
                statusEl.innerText = 'Clipboard access denied';
            }
        }

        // ── Interrupt ─────────────────────────────────────────────────
        function interrupt() {
            window.speechSynthesis.cancel();
            speaking = false; stopWave();
            orbEl.className = 'orb';
            if (navigator.vibrate) navigator.vibrate(50);
            setTimeout(startListening, 200);
        }

        // ── Boot ──────────────────────────────────────────────────────
        function systemInit() {
            if (!booted) {
                window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(''), { volume: 0 }));
                booted = true;
                initBtn.innerText = 'Force Listen';
                const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (ws.readyState === 1) {
                    authSend(`[WAKE_SEQUENCE] System boot complete. Time is ${t}. Initiate Prime Admin greeting protocol warmly.`);
                }
            } else {
                interrupt();
            }
        }

        window.onload = () => {
            window.speechSynthesis.getVoices();
            connect();
        };
    </script>
</body>
</html>
