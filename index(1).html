<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia | Phantom Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00ffff;
            --cyan-dim: rgba(0,255,255,0.12);
            --cyan-glow: 0 0 20px rgba(0,255,255,0.5);
            --bg: #030808;
            --muted: #004444;
            --panel: rgba(0,255,255,0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.08;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 560px;
            padding: 20px;
        }

        /* Orb */
        .orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 1.5px solid var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--cyan-glow), inset 0 0 15px rgba(0,255,255,0.06);
            transition: all 0.4s ease;
            position: relative;
            margin-bottom: 24px;
        }

        .orb::after {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 1px dashed rgba(0,255,255,0.12);
            animation: spin 14s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .orb.listening {
            box-shadow: 0 0 60px rgba(0,255,255,0.7), 0 0 120px rgba(0,255,255,0.25), inset 0 0 40px rgba(0,255,255,0.15);
            transform: scale(1.06);
        }

        .orb.speaking {
            box-shadow: 0 0 50px rgba(0,255,255,0.8), inset 0 0 25px rgba(0,255,255,0.12);
        }

        .orb-label {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: var(--cyan-glow);
        }

        /* Waveform */
        #waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 14px;
        }
        .bar {
            width: 3px;
            height: 4px;
            background: var(--cyan);
            border-radius: 2px;
            opacity: 0.5;
            transition: height 0.08s;
        }

        /* Status */
        #status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.73rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan);
            opacity: 0.85;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Log */
        #log {
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--muted);
            background: var(--panel);
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.77rem;
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan) transparent;
        }
        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
        .log-entry { margin-bottom: 5px; }
        .log-entry.user { color: #80ffff; }
        .log-entry.sofia { color: var(--cyan); opacity: 0.8; }
        .log-entry span { opacity: 0.45; font-size: 0.68rem; margin-right: 6px; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; }
        .btn {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 14px 28px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--cyan-dim); box-shadow: var(--cyan-glow); }

        /* Dots */
        .conn-dot {
            position: fixed;
            top: 16px; right: 20px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #1a3333;
            z-index: 100;
            transition: background 0.3s;
        }
        .conn-dot.online { background: var(--cyan); box-shadow: var(--cyan-glow); animation: blink 2s ease infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .node-tag {
            position: fixed;
            top: 12px; left: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: var(--muted);
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="node-tag">PHANTOM NODE // GUEST</div>
    <div class="conn-dot" id="conn-dot"></div>

    <div class="ui-layer">
        <div class="orb" id="orb">
            <span class="orb-label">SOFIA</span>
        </div>

        <div id="waveform"></div>
        <div id="status">System Standby</div>

        <div id="log">
            <div class="log-entry sofia"><span>//</span>Awaiting boot sequence...</div>
        </div>

        <div class="btn-row">
            <button id="init-btn" class="btn" onclick="systemInit()">Initialize System</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "wss://sofia-mainframe.onrender.com/ws/sofia";
        let ws, recognition, serverTimeout;
        const statusEl = document.getElementById('status');
        const orbEl = document.getElementById('orb');
        const logEl = document.getElementById('log');
        const initBtn = document.getElementById('init-btn');
        const connDot = document.getElementById('conn-dot');
        let booted = false, speaking = false, listening = false;

        // Matrix rain (cyan)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const cols = Math.floor(canvas.width / 16);
        const drops = Array(cols).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(3,8,8,0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffff';
            ctx.font = '13px Share Tech Mono';
            drops.forEach((y, i) => {
                const ch = Math.random() < 0.5
                    ? String.fromCharCode(0x30A0 + Math.random() * 96)
                    : String.fromCharCode(48 + Math.floor(Math.random() * 10));
                ctx.fillText(ch, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 55);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // Waveform
        const waveEl = document.getElementById('waveform');
        for (let i = 0; i < 20; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            b.id = `bar-${i}`;
            waveEl.appendChild(b);
        }
        let waveInt;
        function startWave() {
            clearInterval(waveInt);
            waveInt = setInterval(() => {
                for (let i = 0; i < 20; i++) {
                    document.getElementById(`bar-${i}`).style.height = (4 + Math.random() * 28) + 'px';
                }
            }, 80);
        }
        function stopWave() {
            clearInterval(waveInt);
            for (let i = 0; i < 20; i++) document.getElementById(`bar-${i}`).style.height = '4px';
        }

        function addLog(text, who) {
            const d = document.createElement('div');
            d.className = `log-entry ${who}`;
            const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            d.innerHTML = `<span>${ts}</span>${text.substring(0, 200)}`;
            logEl.appendChild(d);
            logEl.scrollTop = logEl.scrollHeight;
            while (logEl.children.length > 25) logEl.removeChild(logEl.firstChild);
        }

        function connect() {
            statusEl.innerText = 'Connecting to mainframe...';
            ws = new WebSocket(CLOUD_URL);
            ws.onopen = () => {
                connDot.className = 'conn-dot online';
                statusEl.innerText = 'Neural link established';
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                setInterval(() => { if (ws.readyState === 1) ws.send('[PING]'); }, 20000);
            };

            let _ttsQ = [], _ttsActive = false, _streamBuf = '';

            function _pickVoice() {
                const vv = window.speechSynthesis.getVoices();
                return vv.find(v => v.name.toLowerCase().includes('zira'))
                    || vv.find(v => v.name.toLowerCase().includes('samantha'))
                    || vv.find(v => v.lang.startsWith('en')) || vv[0] || null;
            }

            function _runQueue() {
                if (_ttsQ.length === 0) { _ttsActive = false; return; }
                _ttsActive = true;
                const s = _ttsQ.shift();
                const utt = new SpeechSynthesisUtterance(s);
                const v = _pickVoice(); if (v) utt.voice = v;
                utt.rate = 1.05; utt.pitch = 1.08;
                utt.onstart = () => {
                    speaking = true;
                    orbEl.className = 'orb speaking';
                    statusEl.innerText = 'Sofia is speaking...';
                    startWave();
                    if (recognition && listening) { try { recognition.stop(); } catch(e){} }
                };
                utt.onend = () => {
                    if (_ttsQ.length === 0) { speaking = false; orbEl.className = 'orb'; stopWave(); }
                    _runQueue();
                };
                utt.onerror = () => { speaking = false; stopWave(); _runQueue(); };
                window._utt = utt;
                window.speechSynthesis.speak(utt);
            }

            ws.onmessage = (e) => {
                clearTimeout(serverTimeout);
                const raw = e.data;

                if (raw.startsWith('[SS]')) {
                    const s = raw.slice(4).trim();
                    if (s) { _streamBuf += s + ' '; statusEl.innerText = 'Sofia is speaking...'; _ttsQ.push(s); if (!_ttsActive) _runQueue(); }
                    return;
                }
                if (raw.startsWith('[SE]')) {
                    const full = raw.slice(4).trim() || _streamBuf.trim();
                    if (full) addLog(full, 'sofia');
                    _streamBuf = '';
                    const chk = setInterval(() => { if (!_ttsActive && !speaking && booted) { clearInterval(chk); setTimeout(startListening, 200); } }, 100);
                    return;
                }
                let text = raw;
                if (text.includes('[AUDIO_ROUTED]')) text = text.replace('[AUDIO_ROUTED]', '').trim();
                let spoken = text.replace(/\[EXECUTE_PYTHON\][\s\S]*?\[\/EXECUTE_PYTHON\]/g, '');
                spoken = spoken.replace(/\[.*?\]/g, '').trim();
                addLog(spoken, 'sofia');
                if (spoken.length > 0) speakResponse(spoken);
                else { statusEl.innerText = 'Standing by'; startListening(); }
            };

            ws.onclose = () => {
                connDot.className = 'conn-dot';
                statusEl.innerText = 'Connection lost — retrying...';
                setTimeout(connect, 3000);
            };
        }

        function executeLocal(text) {
            if (navigator.vibrate) navigator.vibrate(100);
            const m = text.match(/\[EXECUTE_LOCAL:\s*(.*?)\]/);
            if (m && m[1]) {
                let u = m[1].trim();
                if (u.startsWith('www.')) u = 'https://' + u;
                window.location.assign(u);
            }
        }

        async function getBattery() {
            if ('getBattery' in navigator) {
                const b = await navigator.getBattery();
                return `Battery is at ${Math.round(b.level * 100)}% and is ${b.charging ? 'charging' : 'discharging'}.`;
            }
            return 'Battery telemetry unavailable on this device.';
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel();
            // Stop the mic BEFORE speaking so Sofia can't hear herself
            if (recognition && listening) { try { recognition.stop(); } catch(e) {} }
            setTimeout(() => {
                const utt = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                if (voices.length) {
                    const v = voices.find(v => v.name.toLowerCase().includes('zira'))
                           || voices.find(v => v.name.toLowerCase().includes('samantha'))
                           || voices.find(v => v.lang.startsWith('en'))
                           || voices[0];
                    if (v) utt.voice = v;
                }
                utt.rate = 1.05; utt.pitch = 1.08;
                utt.onstart = () => {
                    speaking = true;
                    orbEl.className = 'orb speaking';
                    statusEl.innerText = 'Sofia is speaking...';
                    startWave();
                };
                utt.onend = () => {
                    speaking = false;
                    orbEl.className = 'orb';
                    statusEl.innerText = 'Standing by';
                    stopWave();
                    if (booted) startListening();
                };
                utt.onerror = () => { speaking = false; stopWave(); if (booted) startListening(); };
                window._utt = utt;
                window.speechSynthesis.speak(utt);
            }, 100);
        }

        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const rec = new SR();
            rec.continuous = false;       // Walkie-talkie: mic closes after each utterance
            rec.interimResults = false;    // No interim — only fire when the sentence is done
            rec.lang = 'en-IN';
            rec.onstart = () => { listening = true; orbEl.className = 'orb listening'; statusEl.innerText = 'Listening...'; };
            rec.onresult = async (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase().trim();
                if (!cmd) return;
                if (cmd.includes('battery') || cmd.includes('power level')) {
                    speakResponse(await getBattery());
                    return;
                }
                addLog(cmd, 'user');
                statusEl.innerText = 'Transmitting...';
                orbEl.className = 'orb';
                if (ws.readyState === 1) {
                    ws.send(cmd);
                    serverTimeout = setTimeout(() => {
                        if (statusEl.innerText.includes('Transmitting'))
                            statusEl.innerText = 'Processing... (server waking)';
                    }, 5000);
                }
            };
            rec.onerror = () => { listening = false; orbEl.className = 'orb'; };
            rec.onend = () => {
                listening = false;
                // Only restart mic once Sofia has finished speaking
                if (booted && !speaking) setTimeout(startListening, 200);
            };
            return rec;
        }

        function startListening() {
            if (listening || speaking) return;
            if (!recognition) recognition = initSpeech();
            if (recognition) { try { recognition.start(); } catch(e) {} }
        }

        function systemInit() {
            if (!booted) {
                window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(''), { volume: 0 }));
                booted = true;
                initBtn.innerText = 'Barge-In';
                const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (ws.readyState === 1) {
                    ws.send(`[WAKE_SEQUENCE] A Phantom Node has connected. Local time is ${t}. Greet the guest warmly with your J.A.R.V.I.S. persona and ask for their name.`);
                }
            } else {
                window.speechSynthesis.cancel();
                speaking = false; stopWave();
                startListening();
            }
        }

        window.onload = () => { window.speechSynthesis.getVoices(); connect(); };
    </script>
</body>
</html>
